<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenRoute — Soutenance Orale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  embed, iframe { width: 100%; height: 100%; border: none; }
  .fallback {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: #fff; font-family: system-ui, sans-serif;
    flex-direction: column; gap: 1rem; text-align: center; padding: 2rem;
  }
  .fallback a { color: #4ade80; }
</style>
</head>
<body>
<embed src="GreenRoute_Soutenance.pdf" type="application/pdf">
<div class="fallback" style="display:none">
  <p>Impossible d'afficher le PDF directement.</p>
  <p><a href="GreenRoute_Soutenance.pdf" download>Télécharger la présentation</a></p>
</div>
<script>
  // Fallback si le navigateur ne supporte pas l'embed PDF
  document.querySelector('embed').addEventListener('error', function() {
    this.style.display = 'none';
    document.querySelector('.fallback').style.display = 'flex';
  });
</script>
</body>
</html>
