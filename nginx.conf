server {
    listen 4567;
    server_name localhost;
    root /usr/share/nginx/html;
    index presentation.html;

    # Compression
    gzip on;
    gzip_types text/css text/plain application/javascript image/png;

    # HTML : jamais en cache (toujours version fraîche)
    location ~* \.html?$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Présentation (point d'entrée)
    location / {
        try_files $uri $uri/ /presentation.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Maquettes
    location /mockups/ {
        alias /usr/share/nginx/html/mockups/;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Diagrammes
    location /diagrams/ {
        alias /usr/share/nginx/html/diagrams/;
    }

    # Cache léger pour les assets statiques (PNG)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
