server {
    listen 4567;
    server_name localhost;
    root /usr/share/nginx/html;
    index presentation.html;

    # Compression
    gzip on;
    gzip_types text/html text/css text/plain application/javascript image/png;

    # Présentation
    location / {
        try_files $uri $uri/ /presentation.html;
    }

    # Maquettes
    location /mockups/ {
        alias /usr/share/nginx/html/mockups/;
    }

    # Diagrammes
    location /diagrams/ {
        alias /usr/share/nginx/html/diagrams/;
    }

    # Cache des assets statiques
    location ~* \.(png|jpg|jpeg|gif|ico|svg|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
