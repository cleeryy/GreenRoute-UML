name: Deploy to Dokploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deployment
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/main",
              "repository": {
                "full_name": "cleeryy/GreenRoute-UML",
                "clone_url": "https://github.com/cleeryy/GreenRoute-UML.git"
              }
            }'
